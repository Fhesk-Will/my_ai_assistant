# 模型配置文件
# 密钥通过 ${ENV_VAR} 引用 .env 中的环境变量

providers:
  dashscope:
    label: 阿里云百炼
    api_key: ${DASHSCOPE_API_KEY}
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    models:
      - id: qwen3.6-plus
        label: qwen3.6-plus
      - id: qwen-plus
        label: wen-plus
      - id: qwen3.6-max-preview
        label: qwen3.6-max-preview
      - id: qwen3.6-flash
        label: qwen3.6-flash

  mimo:
    label: 小米
    api_key: ${MIMO_API_KEY}
    base_url: https://api.xiaomimimo.com/v1
    models:
      - id: mimo-v2.5-pro
        label: mimo-v2.5-pro
      - id: mimo-v2.5
        label: mimo-v2.5

default: dashscope/qwen3.6-plus
