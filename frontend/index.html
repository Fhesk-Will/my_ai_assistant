<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 助手</title>
    <script src="https://cdn.staticfile.net/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.staticfile.net/axios/1.5.0/axios.min.js"></script>
    <script src="https://cdn.staticfile.net/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-enter-active, .modal-leave-active { transition: opacity 0.2s; }
        .modal-enter-from, .modal-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col h-full relative" id="sidebar">
            <div class="p-4 border-b border-gray-200 bg-white">
                <button @click="createNewSession" class="w-full flex items-center justify-center space-x-2 bg-primary text-white p-2.5 rounded-lg hover:bg-primary/90 transition-colors shadow-sm">
                    <span class="font-medium">+ 新对话</span>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-1">
                <div v-for="session in sessionList" :key="session.id"
                    @click="switchSession(session.id)"
                    :class="['group relative p-3 rounded-lg cursor-pointer transition-all flex items-center justify-between',
                            currentSessionId === session.id ? 'bg-blue-100 text-primary' : 'hover:bg-gray-200 text-gray-700']">
                    <div class="truncate pr-6">
                        <div class="text-sm font-medium truncate">{{ session.title }}</div>
                        <div class="text-[10px] opacity-50">{{ session.time }}</div>
                    </div>
                    <div class="absolute right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button :id="'btn-' + session.id" @click.stop="toggleMenu(session.id, $event)" class="menu-trigger p-1 hover:bg-gray-300 rounded">
                            <svg class="w-4 h-4 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" /></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div v-if="activeMenuSession" :style="menuStyle" @click.stop class="fixed z-50 bg-white border border-gray-200 shadow-xl rounded-md py-1 w-28 scale-in-center">
                <button @click="openRenameModal" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-100">重命名</button>
                <button @click="openDeleteModal" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">删除</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative">
            <div class="bg-white border-b border-gray-200 p-4 flex items-center justify-between shadow-sm z-10">
                <h2 class="text-lg font-medium text-gray-800">
                    {{ sessionList.find(s => s.id === currentSessionId)?.title || 'AI 助手' }}
                </h2>
            </div>

            <div class="flex-1 overflow-y-auto bg-gray-50 p-6" ref="chatBox">
                <div class="max-w-3xl mx-auto space-y-6">
                    <div v-if="history.length === 0" class="text-center text-gray-400 mt-20">
                        有什么我可以帮你的？
                    </div>
                    
                    <div v-for="msg in history" :class="['flex', msg.role === 'user' ? 'justify-end' : 'justify-start']">
                        <div :class="[
                            'max-w-[80%] p-4 rounded-xl shadow-sm',
                            msg.role === 'user' ? 'bg-primary text-white rounded-tr-none' : 'bg-white border border-gray-100 rounded-tl-none'
                        ]">
                            <div v-if="msg.role === 'assistant'" class="font-bold text-gray-700 mb-2 text-sm flex items-center space-x-2">
                                <span>✨ 助手</span>
                            </div>
                            <div class="prose prose-sm max-w-none text-inherit" v-html="renderMarkdown(msg.content)"></div>
                        </div>
                    </div>
                    
                    <div v-if="loading" class="flex justify-start">
                        <div class="max-w-[80%] p-4 rounded-xl shadow-sm bg-white border border-gray-100 rounded-tl-none">
                            <div class="flex space-x-1 items-center h-6">
                                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white border-t border-gray-200 p-4">
                <div class="max-w-3xl mx-auto flex items-end space-x-3">
                    <div class="flex-1 relative bg-white border border-gray-300 rounded-2xl focus-within:ring-2 focus-within:ring-primary/50 focus-within:border-primary transition-all shadow-sm">
                        <textarea 
                            v-model="userInput" 
                            @keydown.enter.exact.prevent="sendChat" 
                            placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" 
                            :disabled="loading"
                            rows="1"
                            class="w-full p-3 bg-transparent rounded-2xl focus:outline-none resize-none overflow-hidden block"
                            @input="adjustHeight"
                            id="chatInput"
                        ></textarea>
                    </div>
                    <button @click="sendChat" :disabled="loading || !userInput.trim()" class="p-3 mb-0.5 rounded-full bg-primary text-white hover:bg-primary/90 transition-colors disabled:bg-gray-300 shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <transition name="modal">
            <div v-if="showRenameModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] backdrop-blur-sm" @click.self="showRenameModal = false">
                <div class="bg-white rounded-xl p-6 w-96 shadow-2xl">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">重命名对话</h3>
                    <input v-model="renameInput" @keyup.enter="submitRename" class="w-full border border-gray-300 rounded-lg p-3 mb-6 focus:ring-2 focus:ring-primary outline-none" placeholder="输入新名称" id="renameInputRef" />
                    <div class="flex justify-end space-x-3">
                        <button @click="showRenameModal = false" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                        <button @click="submitRename" class="px-4 py-2 text-sm bg-primary text-white rounded-lg hover:bg-primary/90 shadow-sm">保存</button>
                    </div>
                </div>
            </div>
        </transition>

        <transition name="modal">
            <div v-if="showDeleteModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] backdrop-blur-sm" @click.self="showDeleteModal = false">
                <div class="bg-white rounded-xl p-6 w-96 shadow-2xl">
                    <h3 class="text-lg font-medium text-red-600 mb-2">删除对话</h3>
                    <p class="text-sm text-gray-600 mb-6">确定要永久删除这段对话吗？此操作不可恢复。</p>
                    <div class="flex justify-end space-x-3">
                        <button @click="showDeleteModal = false" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                        <button @click="submitDelete" class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 shadow-sm">确认删除</button>
                    </div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref, onMounted, nextTick, onUnmounted } = Vue;

        createApp({
            setup() {
                const userInput = ref('');
                const history = ref([]);
                const loading = ref(false);
                const chatBox = ref(null);
                const currentSessionId = ref(localStorage.getItem('last_session') || 'default_session');
                const sessionList = ref([]);
                
                const activeMenuSession = ref(null);
                const menuStyle = ref({ top: 0, left: 0 });
                const targetSessionId = ref(null);
                
                const showRenameModal = ref(false);
                const renameInput = ref('');
                const showDeleteModal = ref(false);

                const API_BASE = "http://127.0.0.1:8000";

                // --- 核心修复：更健壮的全局点击关闭逻辑 ---
                const closeMenuOnOuterClick = (e) => {
                    if (activeMenuSession.value && !e.target.closest('.menu-trigger') && !e.target.closest('.fixed')) {
                        activeMenuSession.value = null;
                    }
                };

                const adjustHeight = (e) => {
                    const el = e.target || document.getElementById('chatInput');
                    if (el) {
                        el.style.height = 'auto';
                        el.style.height = (el.scrollHeight < 200 ? el.scrollHeight : 200) + 'px';
                    }
                };

                const fetchSessions = async () => {
                    try {
                        const res = await axios.get(`${API_BASE}/api/sessions`);
                        sessionList.value = res.data.sessions;
                    } catch (e) { console.error("加载列表失败"); }
                };

                const fetchHistory = async (sessionId) => {
                    try {
                        const res = await axios.get(`${API_BASE}/api/history?session_id=${sessionId}`);
                        history.value = res.data.history;
                        scrollToBottom();
                    } catch (e) { history.value = []; }
                };

                const createNewSession = () => {
                    const newId = 'session_' + Date.now();
                    currentSessionId.value = newId;
                    history.value = [];
                    userInput.value = '';
                    adjustHeight({ target: document.getElementById('chatInput') });
                    localStorage.setItem('last_session', newId);
                    sessionList.value.unshift({ id: newId, title: '新对话...', time: '刚刚' });
                };

                const switchSession = (id) => {
                    currentSessionId.value = id;
                    localStorage.setItem('last_session', id);
                    fetchHistory(id);
                    activeMenuSession.value = null;
                };

                // --- 核心修复：计算按钮相对位置，固定菜单弹出点 ---
                const toggleMenu = (sessionId, event) => {
                    if (activeMenuSession.value === sessionId) {
                        activeMenuSession.value = null;
                        return;
                    }
                    activeMenuSession.value = sessionId;
                    
                    nextTick(() => {
                        const btn = document.getElementById('btn-' + sessionId);
                        if (btn) {
                            const rect = btn.getBoundingClientRect();
                            // 菜单出现在按钮的正下方，且向左偏移一点
                            menuStyle.value = { 
                                top: (rect.bottom + 5) + 'px', 
                                left: (rect.left - 80) + 'px' 
                            };
                        }
                    });
                };

                const openRenameModal = () => {
                    targetSessionId.value = activeMenuSession.value;
                    const currentTitle = sessionList.value.find(s => s.id === targetSessionId.value)?.title;
                    renameInput.value = currentTitle || '';
                    showRenameModal.value = true;
                    activeMenuSession.value = null;
                    nextTick(() => document.getElementById('renameInputRef')?.focus());
                };

                const submitRename = async () => {
                    if (renameInput.value.trim()) {
                        try {
                            await axios.post(`${API_BASE}/api/sessions/rename`, {
                                session_id: targetSessionId.value,
                                new_title: renameInput.value.trim()
                            });
                            await fetchSessions();
                        } catch (e) { alert("重命名失败"); }
                    }
                    showRenameModal.value = false;
                };

                const openDeleteModal = () => {
                    targetSessionId.value = activeMenuSession.value;
                    showDeleteModal.value = true;
                    activeMenuSession.value = null;
                };

                const submitDelete = async () => {
                    try {
                        await axios.delete(`${API_BASE}/api/sessions/${targetSessionId.value}`);
                        if (currentSessionId.value === targetSessionId.value) {
                            createNewSession();
                        }
                        await fetchSessions();
                    } catch (e) { alert("删除失败"); }
                    showDeleteModal.value = false;
                };

                const sendChat = async () => {
                    if (!userInput.value.trim() || loading.value) return;
                    const text = userInput.value;
                    userInput.value = '';
                    adjustHeight({ target: document.getElementById('chatInput') });
                    history.value.push({ role: 'user', content: text });
                    scrollToBottom();
                    loading.value = true;
                    try {
                        const res = await axios.post(`${API_BASE}/api/chat`, { 
                            message: text,
                            session_id: currentSessionId.value 
                        });
                        history.value.push({ role: 'assistant', content: res.data.reply });
                        await fetchSessions(); 
                    } catch (e) { alert("发送失败，请确认后端运行正常。"); } finally {
                        loading.value = false;
                        scrollToBottom();
                    }
                };

                const renderMarkdown = (text) => {
                    return text ? marked.parse(text) : '';
                };

                const scrollToBottom = async () => {
                    await nextTick();
                    if (chatBox.value) chatBox.value.scrollTop = chatBox.value.scrollHeight;
                };

                onMounted(() => {
                    fetchSessions();
                    if (currentSessionId.value) fetchHistory(currentSessionId.value);
                    // 绑定原生的全局点击事件
                    window.addEventListener('mousedown', closeMenuOnOuterClick);
                });

                onUnmounted(() => {
                    // 组件卸载时移除监听，防止内存泄漏
                    window.removeEventListener('mousedown', closeMenuOnOuterClick);
                });

                return { 
                    userInput, history, loading, sendChat, chatBox, renderMarkdown,
                    sessionList, currentSessionId, createNewSession, switchSession,
                    toggleMenu, activeMenuSession, menuStyle, adjustHeight,
                    showRenameModal, renameInput, openRenameModal, submitRename,
                    showDeleteModal, openDeleteModal, submitDelete
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
